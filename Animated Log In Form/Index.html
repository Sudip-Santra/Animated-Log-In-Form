<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body>
    <div class="container">
        <div class="main">
            <input type="checkbox" id="chk" aria-hidden="true">
            <div class="login">
                <form class="form">
                    <label for="chk" aria-hidden="true">Log in</label>
                    <input class="input" type="email" autocomplete="off" name="email" placeholder="Email ID" required=""id="myInput">
                    <input class="input" type="password" name="pswd" placeholder="Password" required="">
                    <p id="fp">Forgot Password ? <a href="">Click Here</a></p>
                    <button id="login">Log in</button>
                    <p id="dhaa">Don't have an account ?<label for="chk" aria-hidden="true" id="rgstr">&nbsp;<u>Register</u></label></p>
                </form>
            </div>
            <div class="register">
                <form class="form">
                    <label for="chk" aria-hidden="true">Register</label>
                    <input class="input" type="text" class="input" name="txt" placeholder="Username" autocomplete="off" required="">
                    <input class="input" type="email" autocomplete="off" name="email" placeholder="Enter Your Email...." required="">
                    <input class="input" type="password" name="pswd" placeholder="Set Password...." required="">
                    <button>Register</button>
                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
